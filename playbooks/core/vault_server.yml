---
- name: Configure HashiCorp Vault server
  hosts: vault
  become: true
  vars:
    vault_install: false
    vault_manage_service: true
    vault_user: vault
    vault_group: vault
    vault_config_dir: /etc/vault.d
    vault_data_dir: /opt/vault/data
    vault_storage_backend: file   # Change to 'raft' only after running vault operator migrate
    vault_config_file: /etc/vault.d/vault.hcl
    vault_tls_dir: /etc/vault.d/tls
    vault_tls_cert_file: /etc/vault.d/tls/vault-ui.pem
    vault_tls_key_file: /etc/vault.d/tls/vault-ui-key.pem
    vault_tls_days_valid: 825
    vault_listener_address: 0.0.0.0:8200
    vault_cluster_address: 0.0.0.0:8201
    vault_api_addr: "https://{{ ansible_default_ipv4.address }}:8200"
    vault_cluster_addr: "https://{{ ansible_default_ipv4.address }}:8201"
    vault_tls_disable: false
    vault_ui: true
    vault_log_level: info
    vault_manage_unseal_service: true
    vault_unseal_service_name: vault-unseal
    vault_unseal_service_file: /etc/systemd/system/vault-unseal.service
    vault_unseal_script_path: /usr/local/bin/unseal_vault.sh
    vault_unseal_log_file: /var/log/unseal_vault.log
    vault_unseal_addr: https://127.0.0.1:8200
    vault_unseal_skip_verify: true
    vault_unseal_gpg_passphrase_file: /root/.gpg_passphrase
    vault_unseal_keys_file: /root/.vault_unseal_keys.gpg
    vault_manage_ui_cert_agent: true
    vault_ui_cert_agent_service_name: vault-ui-cert-agent
    vault_ui_cert_agent_service_file: /etc/systemd/system/vault-ui-cert-agent.service
    vault_ui_cert_agent_config_file: /etc/vault.d/agent.d/ui-cert-agent.hcl
    vault_ui_cert_agent_pid_file: /var/lib/vault-agent/ui-cert-agent.pid
    vault_ui_cert_agent_token_file: /var/lib/vault-agent/token
    vault_ui_cert_agent_role_id_file: /etc/vault.d/agent.d/role_id
    vault_ui_cert_agent_secret_id_file: /etc/vault.d/agent.d/secret_id
    vault_ui_cert_agent_approle_name: vault-ui-cert
    vault_ui_cert_issue_bundle_file: /etc/vault.d/tls/vault-ui-issue-bundle.pem
    vault_ui_cert_apply_script: /usr/local/bin/vault_ui_cert_apply.sh
    vault_ui_cert_fqdn: vault.myrobertson.net
    vault_ui_cert_ttl: 720h
    vault_pki_mount: pki_int
    vault_pki_issuer_id: e1792b68-17a9-6afe-e99e-7db5ee405b76
    vault_pki_ui_role_name: vault-webui-myrobertson-net
    vault_ui_cert_policy_name: vault-ui-cert
    vault_root_token_file: /root/.vault-token

  tasks:
    - name: Check if systemd unit sets LimitMEMLOCK=infinity
      ansible.builtin.command:
        cmd: systemctl cat vault
      register: vault_systemd_unit
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Set vault_disable_mlock fact
      ansible.builtin.set_fact:
        vault_disable_mlock: '{{ (vault_systemd_unit.stdout | default("") | lower | regex_search("limitmemlock\\s*=\\s*infinity")) is none }}'

    - name: Install Vault package (optional)
      ansible.builtin.package:
        name: vault
        state: present
      when: vault_install

    - name: Ensure Vault config directory exists
      ansible.builtin.file:
        path: "{{ vault_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure Vault data directory exists
      ansible.builtin.file:
        path: "{{ vault_data_dir }}"
        state: directory
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0750"

    - name: Ensure Vault TLS directory exists
      ansible.builtin.file:
        path: "{{ vault_tls_dir }}"
        state: directory
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0750"
      when: not vault_tls_disable

    - name: Stat existing TLS certificate
      ansible.builtin.stat:
        path: "{{ vault_tls_cert_file }}"
      register: vault_tls_cert_stat
      when: not vault_tls_disable

    - name: Stat existing TLS private key
      ansible.builtin.stat:
        path: "{{ vault_tls_key_file }}"
      register: vault_tls_key_stat
      when: not vault_tls_disable

    - name: Check TLS certificate validity
      ansible.builtin.command:
        cmd: >-
          openssl x509 -checkend 2592000 -noout
          -in {{ vault_tls_cert_file }}
      register: vault_tls_cert_check
      changed_when: false
      failed_when: false
      check_mode: false
      when:
        - not vault_tls_disable
        - vault_tls_cert_stat.stat.exists

    - name: Generate self-signed TLS certificate
      ansible.builtin.command:
        cmd: >-
          openssl req -newkey rsa:4096 -nodes -sha256
          -keyout {{ vault_tls_key_file }}
          -x509 -days {{ vault_tls_days_valid }}
          -out {{ vault_tls_cert_file }}
          -subj "/CN={{ ansible_default_ipv4.address }}"
          -addext "subjectAltName=IP:{{ ansible_default_ipv4.address }}"
      register: vault_tls_generated
      when:
        - not vault_tls_disable
        - not vault_manage_ui_cert_agent
        - not vault_tls_cert_stat.stat.exists or vault_tls_cert_check.rc | default(1) != 0 or not vault_tls_key_stat.stat.exists
      notify: Restart Vault

    - name: Set TLS file ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0640"
      loop:
        - "{{ vault_tls_cert_file }}"
        - "{{ vault_tls_key_file }}"
      when:
        - not vault_tls_disable
        - (vault_tls_cert_stat.stat.exists and vault_tls_key_stat.stat.exists) or (vault_tls_generated is defined and vault_tls_generated is changed)

    - name: Write Vault server configuration
      ansible.builtin.copy:
        dest: "{{ vault_config_file }}"
        owner: root
        group: "{{ vault_group }}"
        mode: "0640"
        content: |
          ui = {{ vault_ui | lower }}
          {% if vault_disable_mlock %}
          disable_mlock = true
          {% endif %}
          log_level = "{{ vault_log_level }}"

          storage "{{ vault_storage_backend }}" {
            path = "{{ vault_data_dir }}"
          }

          listener "tcp" {
            address = "{{ vault_listener_address }}"
            cluster_address = "{{ vault_cluster_address }}"
            tls_disable = {{ vault_tls_disable | ternary(1, 0) }}
          {% if not vault_tls_disable %}
            tls_cert_file = "{{ vault_tls_cert_file }}"
            tls_key_file  = "{{ vault_tls_key_file }}"
            tls_disable_client_certs = true
          {% endif %}
          }

          api_addr = "{{ vault_api_addr }}"
          cluster_addr = "{{ vault_cluster_addr }}"
      notify: Restart Vault

    - name: Write Vault unseal script
      ansible.builtin.copy:
        dest: "{{ vault_unseal_script_path }}"
        owner: root
        group: root
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          export VAULT_ADDR="${VAULT_ADDR:-{{ vault_unseal_addr }}}"
          LOGFILE="{{ vault_unseal_log_file }}"
          PASSPHRASE_FILE="{{ vault_unseal_gpg_passphrase_file }}"
          KEYS_FILE="{{ vault_unseal_keys_file }}"

          touch "$LOGFILE"

          log() {
            printf '%s %s\n' "$(date -Iseconds)" "$1" >> "$LOGFILE"
          }

          for _ in $(seq 1 60); do
            STATUS_OUTPUT="$(vault status 2>&1 || true)"
            if printf '%s' "$STATUS_OUTPUT" | grep -qi 'Sealed[[:space:]]*false'; then
              log "Vault already unsealed"
              exit 0
            fi
            if printf '%s' "$STATUS_OUTPUT" | grep -qi 'Sealed[[:space:]]*true'; then
              break
            fi
            sleep 2
          done

          if ! printf '%s' "$(vault status 2>&1 || true)" | grep -qi 'Sealed[[:space:]]*true'; then
            log "Vault did not reach sealed state in time"
            exit 1
          fi

          set +e
          KEY_MATERIAL="$(gpg --quiet --batch --yes --decrypt --passphrase-file "$PASSPHRASE_FILE" "$KEYS_FILE")"
          GPG_EXIT_CODE=$?
          set -e
          if [ "$GPG_EXIT_CODE" -ne 0 ] || [ -z "$KEY_MATERIAL" ]; then
            log "Failed to decrypt unseal keys"
            exit 1
          fi

          set +u
          UNSEAL_KEYS=($KEY_MATERIAL)
          set -u
          if [ -z "${UNSEAL_KEYS[*]-}" ]; then
            log "No unseal keys found in decrypted material"
            exit 1
          fi

          for key in "${UNSEAL_KEYS[@]}"; do
            vault operator unseal "$key" >/dev/null 2>&1 || true
            if printf '%s' "$(vault status 2>&1 || true)" | grep -qi 'Sealed[[:space:]]*false'; then
              log "Vault unsealed successfully"
              exit 0
            fi
          done

          log "Unseal attempts finished but Vault is still sealed"
          exit 1
      when: vault_manage_unseal_service

    - name: Write Vault unseal systemd unit
      ansible.builtin.copy:
        dest: "{{ vault_unseal_service_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Unseal Vault
          After=vault.service
          Requires=vault.service

          [Service]
          Type=oneshot
          ExecStart={{ vault_unseal_script_path }}
          Environment=VAULT_SKIP_VERIFY={{ vault_unseal_skip_verify | string | lower }}
          Environment=VAULT_ADDR={{ vault_unseal_addr }}

          [Install]
          WantedBy=multi-user.target
      when: vault_manage_unseal_service

    - name: Ensure Vault unseal service is enabled
      ansible.builtin.systemd:
        name: "{{ vault_unseal_service_name }}"
        enabled: true
        daemon_reload: true
      when: vault_manage_unseal_service

    - name: Ensure Vault agent runtime directory exists
      ansible.builtin.file:
        path: /var/lib/vault-agent
        state: directory
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0750"
      when: vault_manage_ui_cert_agent

    - name: Ensure Vault agent config directory exists
      ansible.builtin.file:
        path: /etc/vault.d/agent.d
        state: directory
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0750"
      when: vault_manage_ui_cert_agent

    - name: Check Vault root token file exists
      ansible.builtin.stat:
        path: "{{ vault_root_token_file }}"
      register: vault_root_token_stat
      when: vault_manage_ui_cert_agent

    - name: Fail when Vault root token file is missing
      ansible.builtin.fail:
        msg: "Vault root token file {{ vault_root_token_file }} is required to manage PKI role."
      when:
        - vault_manage_ui_cert_agent
        - not vault_root_token_stat.stat.exists

    - name: Verify requested PKI issuer exists
      ansible.builtin.shell: |
        set -euo pipefail
        export VAULT_ADDR="https://127.0.0.1:8200"
        export VAULT_SKIP_VERIFY=true
        export VAULT_TOKEN="$(cat {{ vault_root_token_file }})"
        vault read {{ vault_pki_mount }}/issuer/{{ vault_pki_issuer_id }} >/dev/null
      args:
        executable: /bin/bash
      changed_when: false
      when: vault_manage_ui_cert_agent

    - name: Ensure PKI role exists for Vault Web UI certificate
      ansible.builtin.shell: |
        set -euo pipefail
        export VAULT_ADDR="https://127.0.0.1:8200"
        export VAULT_SKIP_VERIFY=true
        export VAULT_TOKEN="$(cat {{ vault_root_token_file }})"
        vault write {{ vault_pki_mount }}/roles/{{ vault_pki_ui_role_name }} \
          issuer_ref={{ vault_pki_issuer_id }} \
          allowed_domains={{ vault_ui_cert_fqdn }} \
          allow_bare_domains=true \
          allow_subdomains=false \
          allow_glob_domains=false \
          allow_any_name=false \
          enforce_hostnames=true \
          server_flag=true \
          client_flag=false \
          key_type=ec \
          key_bits=256 \
          max_ttl={{ vault_ui_cert_ttl }}
      args:
        executable: /bin/bash
      changed_when: false
      when: vault_manage_ui_cert_agent

    - name: Ensure Vault UI cert policy can issue from web UI role
      ansible.builtin.shell: |
        set -euo pipefail
        export VAULT_ADDR="https://127.0.0.1:8200"
        export VAULT_SKIP_VERIFY=true
        export VAULT_TOKEN="$(cat {{ vault_root_token_file }})"
        vault policy write {{ vault_ui_cert_policy_name }} - <<'POLICY'
        path "{{ vault_pki_mount }}/issue/{{ vault_pki_ui_role_name }}" {
          capabilities = ["update"]
        }
        path "{{ vault_pki_mount }}/cert/ca" {
          capabilities = ["read"]
        }
        POLICY
      args:
        executable: /bin/bash
      changed_when: false
      when: vault_manage_ui_cert_agent

    - name: Check Vault UI cert agent role_id file exists
      ansible.builtin.stat:
        path: "{{ vault_ui_cert_agent_role_id_file }}"
      register: vault_ui_role_id_stat
      when: vault_manage_ui_cert_agent

    - name: Fail when role_id file is missing
      ansible.builtin.fail:
        msg: "Vault UI cert agent role_id file {{ vault_ui_cert_agent_role_id_file }} is missing."
      when:
        - vault_manage_ui_cert_agent
        - not vault_ui_role_id_stat.stat.exists

    - name: Check Vault UI cert agent secret_id file exists
      ansible.builtin.stat:
        path: "{{ vault_ui_cert_agent_secret_id_file }}"
      register: vault_ui_secret_id_stat
      when: vault_manage_ui_cert_agent

    - name: Create Vault UI cert agent secret_id when missing
      ansible.builtin.shell: |
        set -euo pipefail
        export VAULT_ADDR="https://127.0.0.1:8200"
        export VAULT_SKIP_VERIFY=true
        export VAULT_TOKEN="$(cat {{ vault_root_token_file }})"
        vault write -field=secret_id -f auth/approle/role/{{ vault_ui_cert_agent_approle_name }}/secret-id > {{ vault_ui_cert_agent_secret_id_file }}
      args:
        executable: /bin/bash
      when:
        - vault_manage_ui_cert_agent
        - not vault_ui_secret_id_stat.stat.exists

    - name: Ensure Vault UI cert agent auth file permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0600"
      loop:
        - { path: "{{ vault_ui_cert_agent_role_id_file }}" }
        - { path: "{{ vault_ui_cert_agent_secret_id_file }}" }
      when: vault_manage_ui_cert_agent

    - name: Remove stale Vault UI cert issue bundle
      ansible.builtin.file:
        path: "{{ vault_ui_cert_issue_bundle_file }}"
        state: absent
      when: vault_manage_ui_cert_agent

    - name: Write Vault UI cert apply script
      ansible.builtin.copy:
        dest: "{{ vault_ui_cert_apply_script }}"
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          BUNDLE_FILE="{{ vault_ui_cert_issue_bundle_file }}"
          CERT_FILE="{{ vault_tls_cert_file }}"
          KEY_FILE="{{ vault_tls_key_file }}"

          cert_tmp=$(mktemp)
          key_tmp=$(mktemp)
          trap 'rm -f "$cert_tmp" "$key_tmp"' EXIT

          awk '/^CERT_BEGIN$/{in_cert=1;next}/^CERT_END$/{in_cert=0} in_cert{print}' "$BUNDLE_FILE" > "$cert_tmp"
          awk '/^KEY_BEGIN$/{in_key=1;next}/^KEY_END$/{in_key=0} in_key{print}' "$BUNDLE_FILE" > "$key_tmp"

          if [ ! -s "$cert_tmp" ] || [ ! -s "$key_tmp" ]; then
            echo "failed to parse cert/key from $BUNDLE_FILE" >&2
            exit 1
          fi

          install -o {{ vault_user }} -g {{ vault_group }} -m 0640 "$cert_tmp" "$CERT_FILE"
          install -o {{ vault_user }} -g {{ vault_group }} -m 0640 "$key_tmp" "$KEY_FILE"

          if pgrep -x vault >/dev/null; then
            pkill -HUP -x vault
          fi
      when: vault_manage_ui_cert_agent

    - name: Write Vault UI cert agent config
      ansible.builtin.copy:
        dest: "{{ vault_ui_cert_agent_config_file }}"
        owner: root
        group: "{{ vault_group }}"
        mode: "0640"
        content: |
          pid_file = "{{ vault_ui_cert_agent_pid_file }}"

          vault {
            address = "https://127.0.0.1:8200"
            tls_skip_verify = true
          }

          auto_auth {
            method "approle" {
              mount_path = "auth/approle"
              config = {
                role_id_file_path   = "{{ vault_ui_cert_agent_role_id_file }}"
                secret_id_file_path = "{{ vault_ui_cert_agent_secret_id_file }}"
                remove_secret_id_file_after_reading = false
              }
            }

            sink "file" {
              config = {
                path = "{{ vault_ui_cert_agent_token_file }}"
                mode = 0600
              }
            }
          }

          template_config {
            exit_on_retry_failure = true
          }

          template {
            destination = "{{ vault_ui_cert_issue_bundle_file }}"
            perms       = 0600
            contents = <<EOT
          {{ '{{- with pkiCert "' ~ vault_pki_mount ~ '/issue/' ~ vault_pki_ui_role_name ~ '" "common_name=' ~ vault_ui_cert_fqdn ~ '" "alt_names=' ~ vault_ui_cert_fqdn ~ '" "issuer_ref=' ~ vault_pki_issuer_id ~ '" "ttl=' ~ vault_ui_cert_ttl ~ '" -}}' }}
          CERT_BEGIN
          {{ '{{ .Cert }}' }}
          {{ '{{ .CA }}' }}
          CERT_END
          KEY_BEGIN
          {{ '{{ .Key }}' }}
          KEY_END
          {{ '{{- end -}}' }}
          EOT
            command = "{{ vault_ui_cert_apply_script }}"
          }
      notify: Restart Vault UI Cert Agent
      when: vault_manage_ui_cert_agent

    - name: Write Vault UI cert agent systemd unit
      ansible.builtin.copy:
        dest: "{{ vault_ui_cert_agent_service_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Vault Agent UI Certificate Renewer
          After=network-online.target vault.service
          Wants=network-online.target

          [Service]
          User={{ vault_user }}
          Group={{ vault_group }}
          ExecStart=/usr/bin/vault agent -config={{ vault_ui_cert_agent_config_file }}
          Restart=always
          RestartSec=5
          LimitNOFILE=65536

          [Install]
          WantedBy=multi-user.target
      when: vault_manage_ui_cert_agent

    - name: Ensure Vault UI cert agent service is enabled and started
      ansible.builtin.systemd:
        name: "{{ vault_ui_cert_agent_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
      when: vault_manage_ui_cert_agent

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Ensure Vault service is enabled and started
      ansible.builtin.systemd:
        name: vault
        enabled: true
        state: started
      when:
        - vault_manage_service
        - "'vault.service' in ansible_facts.services"

    - name: Warn when Vault service is missing
      ansible.builtin.debug:
        msg: "Vault service not found. Set vault_install=true or install Vault manually before managing the service."
      when:
        - vault_manage_service
        - "'vault.service' not in ansible_facts.services"

  handlers:
    - name: Restart Vault
      ansible.builtin.systemd:
        name: vault
        state: restarted

    - name: Restart Vault UI Cert Agent
      ansible.builtin.systemd:
        name: "{{ vault_ui_cert_agent_service_name }}"
        state: restarted
