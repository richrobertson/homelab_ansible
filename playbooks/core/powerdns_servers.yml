---
- name: Prepare local Ansible controller for PowerDNS roles
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    pdns_rec_role_main_task_file: "{{ lookup('env', 'HOME') }}/.ansible/roles/powerdns.pdns_recursor/tasks/main.yml"
  tasks:
    - name: Ensure hvac is installed for Vault lookups
      ansible.builtin.pip:
        name: hvac
        state: present
        extra_args: --user
        executable: pip3

    - name: Check whether the installed recursor role exists on the controller
      ansible.builtin.stat:
        path: "{{ pdns_rec_role_main_task_file }}"
      register: pdns_rec_role_main_task_file_stat

    - name: Patch deprecated recursor role include for repo tasks
      ansible.builtin.replace:
        path: "{{ pdns_rec_role_main_task_file }}"
        regexp: '^- include: "repo-\{\{ ansible_os_family \}\}\.yml"$'
        replace: '- ansible.builtin.include_tasks: "repo-{{ ansible_os_family }}.yml"'
      when: pdns_rec_role_main_task_file_stat.stat.exists

    - name: Patch deprecated recursor role include for install tasks
      ansible.builtin.replace:
        path: "{{ pdns_rec_role_main_task_file }}"
        regexp: '^- include: "install-\{\{ansible_system\}\}\.yml"$'
        replace: '- ansible.builtin.include_tasks: "install-{{ansible_system}}.yml"'
      when: pdns_rec_role_main_task_file_stat.stat.exists

    - name: Patch deprecated recursor role include for configure tasks
      ansible.builtin.replace:
        path: "{{ pdns_rec_role_main_task_file }}"
        regexp: '^- include: configure\.yml$'
        replace: '- ansible.builtin.include_tasks: configure.yml'
      when: pdns_rec_role_main_task_file_stat.stat.exists

- name: Configure authoritative PowerDNS server
  hosts: powerdns
  become: true
  roles:
    - { role: PowerDNS.pdns }
  vars:
    _pdns_secrets: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/powerdns', token=lookup('env', 'VAULT_TOKEN'), url=lookup('env', 'VAULT_ADDR')) }}"
    pdns_api_key: "{{ _pdns_secrets.get('api_key', (_pdns_secrets.get('data', {})).get('api_key')) }}"
    pdns_db_password: "{{ _pdns_secrets.get('db_password', (_pdns_secrets.get('data', {})).get('db_password')) }}"
    pdns_auth_webserver_allow_from: "0.0.0.0/0"
    pdns_config:

      # Turns on primary operations
      primary: true

      # Listen Address
      local-address: "192.168.7.201"
      local-port: "53"

      # API Configuration
      api: true
      api-key: "{{ pdns_api_key }}"

      # Embedded webserver
      webserver: true
      webserver-address: "192.168.7.201"
      webserver-port: "8001"
      webserver-allow-from: "{{ pdns_auth_webserver_allow_from }}"

      default-soa-content: "subns.myrobertson.net hostmaster.@ 0 10800 10 604800 3600"
    pdns_backends:
      'gpgsql':
        host: 192.168.7.200
        user: postgres
        password: "{{ pdns_db_password }}"
        dbname: pdns
    pdns_install_repo: "{{ pdns_auth_powerdns_repo_master }}"
    pdns_service_state: "started"
    pdns_service_enabled: true

- name: PDNS Recursor Master
  hosts: powerdns-recurse
  become: true
  vars:
    _pdns_secrets: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/powerdns', token=lookup('env', 'VAULT_TOKEN'), url=lookup('env', 'VAULT_ADDR')) }}"
    pdns_api_key: "{{ _pdns_secrets.get('api_key', (_pdns_secrets.get('data', {})).get('api_key')) }}"
    pdns_recursor_webserver_allow_from: "0.0.0.0/0"
    # Must match the LAN-reachable LoadBalancer IP used by the shared myrobertson-com gateway.
    pdns_rec_split_dns_gateway_ip: "10.31.0.69"
    pdns_rec_split_dns_zone_dir: "/etc/powerdns/recursor/zones"
    pdns_rec_split_dns_zone_file: "{{ pdns_rec_split_dns_zone_dir }}/plex.myrobertson.com.zone"
    pdns_rec_config:

      # Listen Address
      local-address: "192.168.7.202"
      local-port: "53"

      # Embedded webserver
      webserver: true
      webserver-address: "192.168.7.202"
      webserver-port: "8001"
      webserver-allow-from: "{{ pdns_recursor_webserver_allow_from }}"
      api-key: "{{ pdns_api_key }}"

      # Let the kernel do the distribution of queries
      pdns-distributes-queries: "no"
      reuseport: "yes"

      # We need more mthreads to handle huge traffic load
      threads: 5
      max-mthreads: 8192

      # This tests that we expand lists to comma-separated configuration items
      allow-from:
        - 0.0.0.0/0

      forward-zones:
        - "staging.myrobertson.net.=192.168.7.201:53;"
        - "prod.myrobertson.net.=192.168.7.201:53;"
        - "dev.myrobertson.net.=192.168.7.201:53;"
        # Forward the internal AD zone to the reachable AD DNS service.
        # 192.168.1.244 and 192.168.1.2 timed out from the recursor path,
        # which can make local-only hosts such as scooter.myrobertson.net
        # intermittently fail depending on forwarder selection.
        - "myrobertson.net.=192.168.1.245:53;"
      auth-zones:
        - "plex.myrobertson.com={{ pdns_rec_split_dns_zone_file }}"

      forward-zones-recurse:
        - ".=1.1.1.1;8.8.8.8;"

      max-negative-ttl: 15

  pre_tasks:
    - name: Create recursor split-DNS zone directory
      ansible.builtin.file:
        path: "{{ pdns_rec_split_dns_zone_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install plex.myrobertson.com split-DNS auth zone
      ansible.builtin.copy:
        dest: "{{ pdns_rec_split_dns_zone_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          $ORIGIN plex.myrobertson.com.
          $TTL 60
          @ IN SOA localhost. hostmaster.plex.myrobertson.com. 2026042001 300 300 300 60
          @ IN NS localhost.
          @ IN A {{ pdns_rec_split_dns_gateway_ip }}
      register: pdns_rec_split_dns_zone

  roles:
    - { role: powerdns.pdns_recursor }

  post_tasks:
    - name: Restart PDNS recursor after split-DNS zone updates
      ansible.builtin.service:
        name: pdns-recursor
        state: restarted
      when: pdns_rec_split_dns_zone is changed
