---
- import_playbook: update_unifi_port_forward.yml
  vars:
    unifi_allow_missing_console_credentials: true
    unifi_port_forward_updates:
      - rule_name: https
        external_port: 443
        forward_ip: 10.31.0.69
        forward_port: 443
      - rule_name: http
        external_port: 80
        forward_ip: 10.31.0.69
        forward_port: 80

- import_playbook: repair_unifi_gateway_port_forward_firewall.yml
