name: SAST

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install setuptools
          pip install "semgrep==1.91.0"

      - name: Run Semgrep
        run: |
          set -euo pipefail

          SEMGREP_ARGS=(
            --config p/security-audit
            --config p/secrets
            --exclude ceph-ansible
            --exclude roles/pdns-ansible
            --sarif
            --output semgrep.sarif
            --error
          )

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t changed_files < <(
              git diff --name-only --diff-filter=ACMR \
                "${{ github.event.pull_request.base.sha }}" \
                "${{ github.sha }}"
            )

            if (( ${#changed_files[@]} == 0 )); then
              echo "No changed files detected for PR; skipping Semgrep scan."
              printf '%s\n' '{"version":"2.1.0","runs":[]}' > semgrep.sarif
              exit 0
            fi

            semgrep scan "${SEMGREP_ARGS[@]}" "${changed_files[@]}"
          else
            semgrep scan "${SEMGREP_ARGS[@]}" .
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
