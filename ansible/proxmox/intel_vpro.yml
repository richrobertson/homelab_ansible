---
- name:  PLAY 1 - Configure intel vpro interface
  #connection: local
  hosts: proxmox_nodes
  #become: yes
  tasks:
    - name: Add auto up above vpro dedicated port
      ansible.builtin.lineinfile:
        path: /etc/network/interfaces
        insertbefore: '^iface enp90s0$' #Specifythe regexto insert before
        line: 'auto enp90s0'
