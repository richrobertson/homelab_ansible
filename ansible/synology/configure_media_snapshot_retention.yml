---
- name: Configure media share snapshot retention
  hosts: "{{ synology_media_retention_nas_group | default('synology_snapshot_replication_nas') }}"
  gather_facts: false

  vars:
    synology_ssh_host: "{{ ansible_host | default(inventory_hostname) }}"
    synology_ssh_port: "{{ ansible_port | default(22) }}"
    synology_ssh_command: >-
      sshpass -e ssh
      -q
      -p {{ synology_ssh_port | quote }}
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      {{ ansible_user | quote }}@{{ synology_ssh_host | quote }}
    synology_sshpass_environment:
      SSHPASS: "{{ ansible_password }}"

    synology_media_snapshot_retention_profiles:
      - name: radarr
        policy_name: retain_by_adv
        hourly: 0
        daily: 30
        weekly: 8
        monthly: 3
        yearly: 0
        retain_all_days: 7
        minimum: 14
        trigger_hour: 0
      - name: plex
        policy_name: retain_by_adv
        hourly: 0
        daily: 7
        weekly: 2
        monthly: 1
        yearly: 0
        retain_all_days: 1
        minimum: 5
        trigger_hour: 0

  tasks:
    - name: Read current media snapshot retention policies
      ansible.builtin.shell: |
        {{ synology_ssh_command }} {{ (
          "sudo -S /usr/syno/bin/synoretentionconf --get "
          ~ ("Share#" | quote) ~ " "
          ~ (item.name | quote)
          ~ " 2>&1"
        ) | quote }} <<< "$SSHPASS"
      args:
        executable: /bin/bash
      delegate_to: localhost
      environment: "{{ synology_sshpass_environment }}"
      changed_when: false
      register: synology_media_retention_before
      loop: "{{ synology_media_snapshot_retention_profiles }}"

    - name: Configure media snapshot retention policies
      ansible.builtin.shell: |
        {{ synology_ssh_command }} {{ (
          "sudo -S /usr/syno/bin/synoretentionconf --set-policy "
          ~ ("Share#" | quote) ~ " "
          ~ (item.name | quote) ~ " "
          ~ (item.policy_name | quote) ~ " "
          ~ (item.hourly | string | quote) ~ " "
          ~ (item.daily | string | quote) ~ " "
          ~ (item.weekly | string | quote) ~ " "
          ~ (item.monthly | string | quote) ~ " "
          ~ (item.yearly | string | quote) ~ " "
          ~ (item.retain_all_days | string | quote) ~ " "
          ~ (item.minimum | string | quote) ~ " "
          ~ (item.trigger_hour | string | quote) ~ " "
          ~ "2>&1"
        ) | quote }} <<< "$SSHPASS"
      args:
        executable: /bin/bash
      delegate_to: localhost
      environment: "{{ synology_sshpass_environment }}"
      register: synology_media_retention_set
      failed_when: synology_media_retention_set.rc != 0
      loop: "{{ synology_media_snapshot_retention_profiles }}"

    - name: Read updated media snapshot retention policies
      ansible.builtin.shell: |
        {{ synology_ssh_command }} {{ (
          "sudo -S /usr/syno/bin/synoretentionconf --get "
          ~ ("Share#" | quote) ~ " "
          ~ (item.name | quote)
          ~ " 2>&1"
        ) | quote }} <<< "$SSHPASS"
      args:
        executable: /bin/bash
      delegate_to: localhost
      environment: "{{ synology_sshpass_environment }}"
      changed_when: false
      register: synology_media_retention_after
      loop: "{{ synology_media_snapshot_retention_profiles }}"

    - name: Summarize media snapshot retention policies
      ansible.builtin.debug:
        msg:
          - "{{ item.item.name }} retention on {{ inventory_hostname }}"
          - "{{ item.stdout | regex_search('Advance Hourly:.*') | default('Advance Hourly: unknown') }}"
          - "{{ item.stdout | regex_search('Advance Daily:.*') | default('Advance Daily: unknown') }}"
          - "{{ item.stdout | regex_search('Advance Weekly:.*') | default('Advance Weekly: unknown') }}"
          - "{{ item.stdout | regex_search('Advance Monthly:.*') | default('Advance Monthly: unknown') }}"
          - "{{ item.stdout | regex_search('Advance Yearly:.*') | default('Advance Yearly: unknown') }}"
          - "{{ item.stdout | regex_search('Advance RetainDay:.*') | default('Advance RetainDay: unknown') }}"
          - "{{ item.stdout | regex_search('Advance Minimum:.*') | default('Advance Minimum: unknown') }}"
      loop: "{{ synology_media_retention_after.results }}"
