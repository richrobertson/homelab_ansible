---
- name: Prepare Synology DSM admin service account secret in Vault
  hosts: localhost
  gather_facts: false
  tags:
    - vault
    - synology_admin
  vars:
    synology_admin_vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
    synology_admin_vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
    synology_admin_vault_mount: secret
    synology_admin_vault_path: synology/dsm-admin/ad-service-account
    synology_admin_rotate_password: false
    synology_admin_domain_dns: myrobertson.net
    synology_admin_domain_netbios: MYROBERTSON
    synology_admin_sam: svc-syno-admin
    synology_admin_display_name: Synology DSM Admin
    synology_admin_group_name: GG-Synology-DSM-Administrators
    synology_admin_password_length: 48

  tasks:
    - name: Require Vault environment
      ansible.builtin.assert:
        that:
          - synology_admin_vault_addr | length > 0
          - synology_admin_vault_token | length > 0
        fail_msg: Set VAULT_ADDR and VAULT_TOKEN before running this playbook.

    - name: Read existing Synology DSM admin account secret from Vault
      ansible.builtin.command:
        argv:
          - vault
          - kv
          - get
          - -format=json
          - "-mount={{ synology_admin_vault_mount }}"
          - "{{ synology_admin_vault_path }}"
      environment:
        VAULT_ADDR: "{{ synology_admin_vault_addr }}"
        VAULT_TOKEN: "{{ synology_admin_vault_token }}"
      register: synology_admin_vault_existing
      failed_when: false
      changed_when: false
      no_log: true

    - name: Select existing password when rotation is disabled
      ansible.builtin.set_fact:
        synology_admin_existing_password: >-
          {{
            (
              synology_admin_vault_existing.stdout
              | default('{}', true)
              | from_json
            ).data.data.password
            | default('')
          }}
      no_log: true

    - name: Generate Synology DSM admin service account password when needed
      ansible.builtin.set_fact:
        synology_admin_password: >-
          {{
            lookup(
              'ansible.builtin.password',
              '/dev/null',
              chars='ascii_letters,digits',
              length=synology_admin_password_length
            )
          }}
        synology_admin_generated_password: true
      when:
        - synology_admin_rotate_password | bool or synology_admin_existing_password | length == 0
      no_log: true

    - name: Reuse current Synology DSM admin service account password
      ansible.builtin.set_fact:
        synology_admin_password: "{{ synology_admin_existing_password }}"
        synology_admin_generated_password: false
      when:
        - not (synology_admin_rotate_password | bool)
        - synology_admin_existing_password | length > 0
      no_log: true

    - name: Store Synology DSM admin service account secret in Vault
      ansible.builtin.command:
        argv:
          - vault
          - kv
          - put
          - "-mount={{ synology_admin_vault_mount }}"
          - "{{ synology_admin_vault_path }}"
          - "domain_dns={{ synology_admin_domain_dns }}"
          - "domain_netbios={{ synology_admin_domain_netbios }}"
          - "sam={{ synology_admin_sam }}"
          - "upn={{ synology_admin_sam }}@{{ synology_admin_domain_dns }}"
          - "username={{ synology_admin_domain_dns }}\\{{ synology_admin_sam }}"
          - "netbios_username={{ synology_admin_domain_netbios }}\\{{ synology_admin_sam }}"
          - "display_name={{ synology_admin_display_name }}"
          - "group_name={{ synology_admin_group_name }}"
          - "password={{ synology_admin_password }}"
          - purpose=Synology DSM administrative automation
      environment:
        VAULT_ADDR: "{{ synology_admin_vault_addr }}"
        VAULT_TOKEN: "{{ synology_admin_vault_token }}"
      no_log: true

    - name: Show Vault secret summary
      ansible.builtin.debug:
        msg:
          - "Vault path: {{ synology_admin_vault_mount }}/data/{{ synology_admin_vault_path }}"
          - "AD account: {{ synology_admin_sam }}@{{ synology_admin_domain_dns }}"
          - "AD group: {{ synology_admin_group_name }}"
          - "Password generated or rotated: {{ synology_admin_generated_password }}"

- name: Ensure Active Directory service account for Synology DSM administration
  hosts: "{{ synology_admin_domain_target_group | default('domain_controllers_windows') }}"
  gather_facts: false
  tags:
    - ad
    - synology_admin
  vars:
    synology_admin_vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
    synology_admin_vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
    synology_admin_vault_mount: secret
    synology_admin_vault_path: synology/dsm-admin/ad-service-account
    synology_admin_domain_dns: myrobertson.net
    synology_admin_sam: svc-syno-admin
    synology_admin_display_name: Synology DSM Admin
    synology_admin_group_name: GG-Synology-DSM-Administrators
    synology_admin_account_description: Service account used for Synology DSM SSH/API automation on scooter and kermit.
    synology_admin_ad_ou: ""
    synology_admin_password_never_expires: true
    synology_admin_rotate_password: false
    synology_admin_extra_ad_groups: []

  tasks:
    - name: Read Synology DSM admin account secret from Vault
      ansible.builtin.command:
        argv:
          - vault
          - kv
          - get
          - -format=json
          - "-mount={{ synology_admin_vault_mount }}"
          - "{{ synology_admin_vault_path }}"
      environment:
        VAULT_ADDR: "{{ synology_admin_vault_addr }}"
        VAULT_TOKEN: "{{ synology_admin_vault_token }}"
      delegate_to: localhost
      register: synology_admin_vault_secret
      changed_when: false
      no_log: true
      run_once: true

    - name: Parse Synology DSM admin account secret
      ansible.builtin.set_fact:
        synology_admin_vault_secret_data: >-
          {{
            (
              synology_admin_vault_secret.stdout
              | from_json
            ).data.data
          }}
      no_log: true
      run_once: true

    - name: Ensure ActiveDirectory PowerShell module is available
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable -Name ActiveDirectory)) {
            throw 'The ActiveDirectory PowerShell module is not available on this host.'
          }
          'ActiveDirectory module available'
      changed_when: false
      run_once: true

    - name: Ensure Synology DSM admin AD group exists
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          Import-Module ActiveDirectory

          $groupName = {{ synology_admin_group_name | to_json }}
          $description = 'Allows Synology DSM administrative automation on scooter and kermit.'
          $ou = {{ synology_admin_ad_ou | to_json }}
          $existing = Get-ADGroup -LDAPFilter "(sAMAccountName=$groupName)" -Properties Description -ErrorAction SilentlyContinue

          if ($existing) {
            if ($existing.Description -ne $description) {
              Set-ADGroup -Identity $existing.DistinguishedName -Description $description
              Write-Output 'Updated'
            }
            else {
              Write-Output 'Present'
            }
            exit 0
          }

          $params = @{
            Name = $groupName
            SamAccountName = $groupName
            GroupCategory = 'Security'
            GroupScope = 'Global'
            Description = $description
          }
          if ($ou) {
            $params['Path'] = $ou
          }

          New-ADGroup @params
          Write-Output 'Created'
      register: synology_admin_ad_group_result
      changed_when: >-
        'Created' in synology_admin_ad_group_result.output
        or 'Updated' in synology_admin_ad_group_result.output
      run_once: true

    - name: Ensure Synology DSM admin AD user exists
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          Import-Module ActiveDirectory

          $sam = {{ synology_admin_sam | to_json }}
          $upn = {{ synology_admin_vault_secret_data.upn | to_json }}
          $displayName = {{ synology_admin_display_name | to_json }}
          $description = {{ synology_admin_account_description | to_json }}
          $password = ConvertTo-SecureString {{ synology_admin_vault_secret_data.password | to_json }} -AsPlainText -Force
          $ou = {{ synology_admin_ad_ou | to_json }}
          $passwordNeverExpires = [System.Convert]::ToBoolean('{{ synology_admin_password_never_expires | bool | ternary("true", "false") }}')
          $rotatePassword = [System.Convert]::ToBoolean('{{ synology_admin_rotate_password | bool | ternary("true", "false") }}')

          $existing = Get-ADUser -LDAPFilter "(sAMAccountName=$sam)" -Properties DisplayName,Description,Enabled,PasswordNeverExpires,UserPrincipalName -ErrorAction SilentlyContinue
          if (-not $existing) {
            $params = @{
              Name = $displayName
              SamAccountName = $sam
              UserPrincipalName = $upn
              DisplayName = $displayName
              Description = $description
              AccountPassword = $password
              Enabled = $true
              PasswordNeverExpires = $passwordNeverExpires
            }
            if ($ou) {
              $params['Path'] = $ou
            }
            New-ADUser @params
            Write-Output 'Created'
            exit 0
          }

          $changed = $false
          $setParams = @{
            Identity = $existing.DistinguishedName
            DisplayName = $displayName
            Description = $description
            UserPrincipalName = $upn
            Enabled = $true
            PasswordNeverExpires = $passwordNeverExpires
          }
          Set-ADUser @setParams

          if ($rotatePassword) {
            Set-ADAccountPassword -Identity $existing.DistinguishedName -Reset -NewPassword $password
            $changed = $true
          }

          if (-not $existing.Enabled -or
              $existing.DisplayName -ne $displayName -or
              $existing.Description -ne $description -or
              $existing.UserPrincipalName -ne $upn -or
              $existing.PasswordNeverExpires -ne $passwordNeverExpires) {
            $changed = $true
          }

          if ($changed) {
            Write-Output 'Updated'
          }
          else {
            Write-Output 'Present'
          }
      register: synology_admin_ad_user_result
      changed_when: >-
        'Created' in synology_admin_ad_user_result.output
        or 'Updated' in synology_admin_ad_user_result.output
      no_log: true
      run_once: true

    - name: Ensure Synology DSM admin user is a member of its AD group
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          Import-Module ActiveDirectory

          $sam = {{ synology_admin_sam | to_json }}
          $groupName = {{ synology_admin_group_name | to_json }}
          $user = Get-ADUser -Identity $sam -ErrorAction Stop
          $group = Get-ADGroup -Identity $groupName -ErrorAction Stop
          $member = Get-ADGroupMember -Identity $group.DistinguishedName -Recursive |
            Where-Object { $_.DistinguishedName -eq $user.DistinguishedName }

          if ($member) {
            Write-Output 'Present'
            exit 0
          }

          Add-ADGroupMember -Identity $group.DistinguishedName -Members $user.DistinguishedName
          Write-Output 'Added'
      register: synology_admin_ad_membership_result
      changed_when: "'Added' in synology_admin_ad_membership_result.output"
      run_once: true

    - name: Ensure Synology DSM admin user is a member of extra AD groups
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          Import-Module ActiveDirectory

          $sam = {{ synology_admin_sam | to_json }}
          $groupNames = ConvertFrom-Json -InputObject @'
          {{ synology_admin_extra_ad_groups | to_json }}
          '@
          $user = Get-ADUser -Identity $sam -ErrorAction Stop
          $changed = $false

          foreach ($groupName in $groupNames) {
            $group = Get-ADGroup -Identity $groupName -ErrorAction Stop
            $member = Get-ADGroupMember -Identity $group.DistinguishedName -Recursive |
              Where-Object { $_.DistinguishedName -eq $user.DistinguishedName }

            if ($member) {
              Write-Output "Present: $groupName"
              continue
            }

            Add-ADGroupMember -Identity $group.DistinguishedName -Members $user.DistinguishedName
            Write-Output "Added: $groupName"
            $changed = $true
          }

          if (-not $changed) {
            Write-Output 'No changes'
          }
      register: synology_admin_extra_ad_membership_result
      changed_when: "'Added:' in synology_admin_extra_ad_membership_result.output"
      when: synology_admin_extra_ad_groups | length > 0
      run_once: true

    - name: Show AD service account summary
      ansible.builtin.debug:
        msg:
          - "AD account ensured: {{ synology_admin_sam }}@{{ synology_admin_domain_dns }}"
          - "AD group ensured: {{ synology_admin_group_name }}"
          - "Extra AD groups ensured: {{ synology_admin_extra_ad_groups | join(', ') }}"
      run_once: true

- name: Optionally grant Synology DSM local administrators membership
  hosts: "{{ synology_admin_nas_group | default('synology_snapshot_replication_nas') }}"
  gather_facts: false
  tags:
    - nas
    - synology_admin
  vars:
    synology_admin_apply_dsm_group: false
    synology_admin_domain_netbios: MYROBERTSON
    synology_admin_group_name: GG-Synology-DSM-Administrators
    synology_admin_dsm_group: administrators
    synology_admin_domain_group_principal: "{{ synology_admin_domain_netbios }}\\{{ synology_admin_group_name }}"

  tasks:
    - name: Show DSM administrator grant command when not applying
      ansible.builtin.debug:
        msg:
          - "DSM grant is not applied by default because it requires an existing DSM admin SSH session."
          - "After SSH works, rerun with -e synology_admin_apply_dsm_group=true."
          - "Principal to grant: {{ synology_admin_domain_group_principal }}"
      when: not (synology_admin_apply_dsm_group | bool)

    - name: Grant AD group membership in Synology local administrators group
      ansible.builtin.raw: >-
        /usr/syno/sbin/synogroup
        --memberadd
        {{ synology_admin_dsm_group | quote }}
        {{ synology_admin_domain_group_principal | quote }}
      register: synology_admin_dsm_group_result
      changed_when: "'success' in (synology_admin_dsm_group_result.stdout | lower)"
      when: synology_admin_apply_dsm_group | bool

    - name: Show Synology local administrators group membership
      ansible.builtin.raw: "/usr/syno/sbin/synogroup --get {{ synology_admin_dsm_group | quote }}"
      register: synology_admin_dsm_group_members
      changed_when: false
      when: synology_admin_apply_dsm_group | bool

    - name: Report Synology local administrators group membership
      ansible.builtin.debug:
        var: synology_admin_dsm_group_members.stdout_lines
      when: synology_admin_apply_dsm_group | bool
